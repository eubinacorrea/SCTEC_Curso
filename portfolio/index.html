<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sabrina</title>
</head>

<body>
    <Header>
        
        <button id="back-button" class="btn-nav btn-bio hidden" onclick="changeTab('bio')">
            <span><img src="logo (negativo).svg" alt="Sabrina Corrêa" class="horizontal"></span>
        </button>
    </Header>
    <div class="grid-background" id="gridBg"></div>

    <main class="main-container">

        <section id="content-box" class="content-glass">
            <div id="text-content" class="animate-in"></div>

            <nav class="glass-nav">
                <button class="btn-nav btn-skills" onclick="changeTab('skills')"><span>Sobre</span></button>
                <button class="btn-nav btn-lab" onclick="changeTab('lab')"><span>Projetos</span></button>
                <button class="btn-nav btn-contato" onclick="changeTab('contato')"><span>Contato</span></button>
            </nav>            
        </section>
        
        <div id="corpo-do-site" class="conteudo-extra"></div>
        <img src="logo vertical (negativo).svg" alt="vertical" class="vertical">

    </main>
    <script src="script.js"></script>
</body>

</html>
